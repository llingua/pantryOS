name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  addon-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate addon structure
        run: npm test

      - name: Run health smoke test
        run: npm run test:smoke
